<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela de Periféricos</title>
</head>
<body>
    <table border="1">
        <caption>Estoque de Periféricos</caption>
        <thead scope="col">
            <tr>
                <th>ID</th>
                <th>Produto</th>
                <th>Qtde</th>
                <th>Preço</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>001</td>
                <td>Teclado Mecânico</td>
                <td>15</td>
                <td>R$ 250,00</td>
            </tr>
            <tr>
                
                <td>002</td>
                <td>Mouse Gamer</td>
                <td>30</td>
                <td>R$ 120,00</td>
            </tr>
            <tr>
                
                <td>003</td>
                <td>Headset RGB</td>
                <td>10</td>
                <td>R$ 300,00</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="3">Valor Total em Estoque:</td>
                <td>R$ 10.350,00</td>
            </tr>

        </tfoot>
    </table>
</body>
</html>
