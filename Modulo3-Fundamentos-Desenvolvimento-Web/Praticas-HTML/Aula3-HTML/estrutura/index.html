<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estrutura de uma Página HTML </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Este é o header</h1>
        <nav>
            <ul>
                <li>Início</li>
                <li>Sobre</li>
                <li>Contatos</li>
            </ul>
        </nav>
    </header>

    
    <div class="conteudo-principal">
        <main>
            <p>Aqui temos o contéudo principal</p>
            <article>Aqui temos um contéudo independente</article>
        </main>
        <aside>
            <p>Aqui temos o menu lateral do site</p>
        </aside>
    </div>

    <footer>
        <p>Aqui temo o rodapé do site</p>
    </footer>
</body>
</html>
